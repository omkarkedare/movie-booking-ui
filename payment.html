<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Movie Night</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<main style="text-align:center; margin-top:120px;">
  <h2>Payment Page</h2>

<div class="date-n-cinema" style="justify-content:center;">
  <input id="cardNumber" placeholder="Card Number" maxlength="19" oninput="formatCardNumber(this)">
  <input id="cardHolder" placeholder="Card Holder Name" oninput="validateName(this)">
  <input id="expiryDate" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)">
  <input id="cvv" placeholder="CVV" maxlength="4" oninput="validateCVV(this)">
</div>


<h3>Amount to Pay: ₹ <span id="payAmount"></span></h3>

<button class="type-submit" onclick="confirmPayment()">Pay Now</button>

<script>
  function formatCardNumber(input) {
    let value = input.value.replace(/\D/g, "").substring(0, 16);
    value = value.replace(/(.{4})/g, "$1 ").trim();
    input.value = value;
  }

  function validateName(input) {
    input.value = input.value.replace(/[^a-zA-Z\s]/g, "");
  }

  function formatExpiry(input) {
    let value = input.value.replace(/\D/g, "").substring(0, 4);

    if (value.length >= 3) {
      value = value.substring(0, 2) + "/" + value.substring(2);
    }

    input.value = value;
  }

  function validateCVV(input) {
    input.value = input.value.replace(/\D/g, "").substring(0, 4);
  }

  function showPopup(message) {
    alert(message);
  }

  function confirmPayment() {
    let cardNumber = document.getElementById("cardNumber").value.replace(/\s/g, "");
    let cardHolder = document.getElementById("cardHolder").value.trim();
    let expiryDate = document.getElementById("expiryDate").value.trim();
    let cvv = document.getElementById("cvv").value.trim();

    let cardNumberPattern = /^[0-9]{16}$/;
    let namePattern = /^[A-Za-z ]{3,}$/;
    let expiryPattern = /^(0[1-9]|1[0-2])\/([0-9]{2})$/;
    let cvvPattern = /^[0-9]{3,4}$/;

    if (
      !cardNumberPattern.test(cardNumber) ||
      !namePattern.test(cardHolder) ||
      !expiryPattern.test(expiryDate) ||
      !cvvPattern.test(cvv)
    ) {
      showPopup("Invalid Details");
      return;
    }

    let [month, year] = expiryDate.split("/");
    let currentDate = new Date();
    let currentMonth = currentDate.getMonth() + 1;
    let currentYear = currentDate.getFullYear() % 100;

    if (
      parseInt(year) < currentYear ||
      (parseInt(year) === currentYear && parseInt(month) < currentMonth)
    ) {
      showPopup("Invalid Details");
      return;
    }

    showPopup("Payment Successful!");
  }
</script>
</main>

<script>
/* Show price from bookings page */
document.getElementById('payAmount').innerText =
  localStorage.getItem("ticketPrice");

/* On payment */
function confirmPayment(){
  window.location.href = "ticket.html";
}
</script>

</body>
</html>

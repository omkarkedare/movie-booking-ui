<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Movie Night</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <main style="text-align:center; margin-top:120px;">
    <h2 class="headline-text">Payment Page</h2>

    <div class="date-n-cinema" style="justify-content:center;">
      <input
        id="cardNumber"
        type="text"
        placeholder="Card Number"
        maxlength="19"
        oninput="formatCardNumber(this)"
      >

      <input
        id="cardHolder"
        type="text"
        placeholder="Card Holder Name"
        oninput="validateName(this)"
      >

      <input
        id="expiryDate"
        type="text"
        placeholder="MM/YY"
        maxlength="5"
        oninput="formatExpiry(this)"
      >

      <input
        id="cvv"
        type="password"
        placeholder="CVV"
        maxlength="4"
        oninput="validateCVV(this)"
      >
    </div>

    <h3 style="margin-top:20px;">Amount to Pay: ₹ <span id="payAmount">0</span></h3>

    <button class="type-submit" onclick="confirmPayment()">Pay Now</button>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const price = localStorage.getItem("ticketPrice") || "0";
      document.getElementById("payAmount").textContent = price;
    });

    function formatCardNumber(input) {
      let value = input.value.replace(/\D/g, "").substring(0, 16);
      value = value.replace(/(.{4})/g, "$1 ").trim();
      input.value = value;
    }

    function validateName(input) {
      input.value = input.value.replace(/[^a-zA-Z\s]/g, "");
    }

    function formatExpiry(input) {
      let value = input.value.replace(/\D/g, "").substring(0, 4);

      if (value.length >= 3) {
        value = value.substring(0, 2) + "/" + value.substring(2);
      }

      input.value = value;
    }

    function validateCVV(input) {
      input.value = input.value.replace(/\D/g, "").substring(0, 4);
    }

    function confirmPayment() {
      const cardNumber = document.getElementById("cardNumber").value.replace(/\s/g, "");
      const cardHolder = document.getElementById("cardHolder").value.trim();
      const expiryDate = document.getElementById("expiryDate").value.trim();
      const cvv = document.getElementById("cvv").value.trim();

      const cardNumberPattern = /^[0-9]{16}$/;
      const namePattern = /^[A-Za-z ]{3,}$/;
      const expiryPattern = /^(0[1-9]|1[0-2])\/([0-9]{2})$/;
      const cvvPattern = /^[0-9]{3,4}$/;

      if (!cardNumberPattern.test(cardNumber)) {
        alert("Please enter a valid 16-digit card number.");
        return;
      }

      if (!namePattern.test(cardHolder)) {
        alert("Please enter a valid card holder name.");
        return;
      }

      if (!expiryPattern.test(expiryDate)) {
        alert("Please enter expiry date in MM/YY format.");
        return;
      }

      if (!cvvPattern.test(cvv)) {
        alert("Please enter a valid CVV.");
        return;
      }

      const parts = expiryDate.split("/");
      const month = parseInt(parts[0], 10);
      const year = parseInt(parts[1], 10);

      const today = new Date();
      const currentMonth = today.getMonth() + 1;
      const currentYear = today.getFullYear() % 100;

      if (year < currentYear || (year === currentYear && month < currentMonth)) {
        alert("Card expiry date is invalid.");
        return;
      }

      alert("Payment Successful!");
      window.location.href = "ticket.html";
    }
  </script>

</body>
</html>
